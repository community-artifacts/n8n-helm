name: Validate Chart

# Validation pipeline. Runs on:
#   - push to `develop` itself (safety net for direct-push bypass cases;
#     the bot's release commits carry `[skip ci]` and are ignored)
#   - PR opened / synced / reopened targeting `develop` or `main`
#     (covers topic branches: a push to `dev/<topic>` only triggers CI
#      once a PR into `develop` is open, via the `synchronize` event)
#   - manual `workflow_dispatch`
#
# Topic-branch pushes intentionally do NOT trigger CI on their own —
# pre-PR commits run locally; CI engages the moment a PR is opened, so
# runner-minutes are spent on work that's actually up for review.
#
# Never runs on `main` itself — `main` is reached only via merged PRs from
# `develop` and triggers the Release Charts workflow instead. See
# CONTRIBUTING.md ("Branch strategy") and TESTING.md for the full picture.

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - main
  workflow_dispatch: {}

permissions:
  contents: read

env:
  HELM_UNITTEST_PLUGIN: https://github.com/helm-unittest/helm-unittest.git

jobs:
  lint:
    name: helm lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Add chart dependencies
        run: |
          helm repo add valkey https://valkey.io/valkey-helm
          helm repo add minio https://charts.min.io/
          helm repo update

      - name: Update chart subcharts
        run: helm dependency update charts/n8n

      - name: Lint
        run: helm lint charts/n8n

  unittest:
    name: helm-unittest (773 assertions, 219 snapshots)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Install helm-unittest plugin
        run: helm plugin install --verify=false ${{ env.HELM_UNITTEST_PLUGIN }}

      - name: Add chart dependencies
        run: |
          helm repo add valkey https://valkey.io/valkey-helm
          helm repo add minio https://charts.min.io/
          helm repo update

      - name: Update chart subcharts
        run: helm dependency update charts/n8n

      - name: Run unit tests
        run: helm unittest --strict -f 'unittests/*.yaml' charts/n8n

  scenarios:
    name: Render scenario matrix (helm template)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Add chart dependencies
        run: |
          helm repo add valkey https://valkey.io/valkey-helm
          helm repo add minio https://charts.min.io/
          helm repo update

      - name: Update chart subcharts
        run: helm dependency update charts/n8n

      - name: Run scenario matrix (phase 1 — template only)
        run: ./scripts/run_scenarios.sh

  schema:
    name: values.schema.json well-formed
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON syntax
        run: jq empty charts/n8n/values.schema.json

      - name: Verify every top-level key in values.yaml has a schema entry
        run: |
          set -e
          # Top-level keys in values.yaml (skip comment lines and indented children)
          mapfile -t values_keys < <(awk '/^[a-zA-Z_]+:/ {sub(":.*",""); print}' charts/n8n/values.yaml | sort -u)
          missing=()
          for key in "${values_keys[@]}"; do
            if ! jq -e --arg k "$key" '.properties | has($k)' charts/n8n/values.schema.json >/dev/null; then
              missing+=("$key")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::values.yaml has top-level keys not declared in values.schema.json:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "All top-level values keys are declared in values.schema.json."

  kubeconform:
    name: kubeconform (validate rendered manifests vs Kubernetes API)
    runs-on: ubuntu-latest
    needs: scenarios
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Install kubeconform
        run: |
          curl -fsSL -o /tmp/kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          sudo tar -xzf /tmp/kubeconform.tar.gz -C /usr/local/bin kubeconform
          kubeconform -v

      - name: Add chart dependencies
        run: |
          helm repo add valkey https://valkey.io/valkey-helm
          helm repo add minio https://charts.min.io/
          helm repo update

      - name: Update chart subcharts
        run: helm dependency update charts/n8n

      - name: Render + validate each scenario
        run: |
          set -euo pipefail
          fail=0
          for scenario in tests/scenarios/*.values.yaml; do
            short=$(basename "$scenario" .values.yaml)
            # Skip the negative-template scenario (intentionally fails helm template).
            case "$short" in
              10-gitops-safe-must-fail) continue ;;
            esac
            echo "==> $short"
            if ! helm template ci charts/n8n -f "$scenario" 2>/tmp/err.log \
                  | kubeconform -strict -ignore-missing-schemas \
                      -schema-location default \
                      -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
                      -summary -; then
              fail=$((fail + 1))
              cat /tmp/err.log
            fi
          done
          exit $fail

  minikube:
    name: minikube install (representative scenarios)
    runs-on: ubuntu-latest
    needs: [lint, unittest, scenarios]
    if: ${{ github.event_name == 'push' || github.event.pull_request.draft == false }}
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4

      - name: Start minikube
        uses: medyagh/setup-minikube@latest
        with:
          driver: docker
          memory: 6g
          cpus: 2
          addons: storage-provisioner-rancher,default-storageclass

      - name: Add chart dependencies
        run: |
          helm repo add valkey https://valkey.io/valkey-helm
          helm repo add minio https://charts.min.io/
          helm repo update

      - name: Update chart subcharts
        run: helm dependency update charts/n8n

      - name: Defaults — install / wait / uninstall
        run: |
          kubectl create ns ci-01 --dry-run=client -o yaml | kubectl apply -f -
          helm install t01 charts/n8n -n ci-01 \
            -f tests/scenarios/01-defaults.values.yaml \
            --wait --timeout 8m
          helm uninstall t01 -n ci-01
          kubectl delete ns ci-01 --wait=false

      - name: Bundled PostgreSQL — install / wait / uninstall
        run: |
          kubectl create ns ci-02 --dry-run=client -o yaml | kubectl apply -f -
          helm install t02 charts/n8n -n ci-02 \
            -f tests/scenarios/02-postgres-bundled.values.yaml \
            --wait --timeout 10m
          helm uninstall t02 -n ci-02
          kubectl delete ns ci-02 --wait=false
