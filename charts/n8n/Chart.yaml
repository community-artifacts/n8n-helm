apiVersion: v2
name: n8n
description: |-
  A Helm chart for n8n, the fair-code workflow automation platform.
  Independent, production-oriented distribution maintained by the
  community-artifacts organisation. Ships additive operational knobs
  (task-runner controls, queue mode, KEDA/HPA/PDB, S3 binary storage,
  multi-main, webhook processors, ServiceMonitor).
type: application
version: 2.3.0
appVersion: 2.21.4
kubeVersion: ">=1.23.0-0"
home: https://github.com/community-artifacts/n8n-helm
icon: https://avatars1.githubusercontent.com/u/45487711?s=200&v=4
keywords:
  - n8n
  - Workflow Automation
  - Workflow
  - Automation
  - iPaaS
  - integration-framework
  - low-code-plattform
  - low-code
sources:
  - https://github.com/community-artifacts/n8n-helm
  - https://github.com/n8n-io/n8n
maintainers:
  - name: community-artifacts
    url: https://github.com/community-artifacts
dependencies:
  - condition: redis.enabled
    name: valkey
    alias: redis
    repository: https://valkey.io/valkey-helm
    version: 0.9.4
  - condition: postgresql.enabled
    name: postgres
    alias: postgresql
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.19.4
  - condition: minio.enabled
    name: minio
    repository: https://charts.min.io/
    version: 5.4.0
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Chart Source
      url: https://github.com/community-artifacts/n8n-helm
    - name: n8n Project
      url: https://github.com/n8n-io/n8n
  # Per-version changelog rendered on the chart's Artifact Hub page.
  # Replace the entries on every version bump — they describe the
  # changes since the previous version. Valid `kind` values:
  # added | changed | deprecated | removed | fixed | security.
  # Spec: https://artifacthub.io/docs/topics/annotations/helm/
  artifacthub.io/changes: |
    - kind: added
      description: New `taskRunners.external.launcherConfig` value. Setting it to the desired `n8n-task-runners.json` content makes the chart render a labeled ConfigMap and overlay `/etc/n8n-task-runners.json` on the runner sidecar automatically. Removes the boilerplate of pairing a custom ConfigMap with `main.volumes` + `taskRunners.external.extraVolumeMounts`, which was the only previous path to widen the launcher's `env-overrides` allowlist (the `n8nio/runners` image forces `N8N_RUNNERS_STDLIB_ALLOW` / `N8N_RUNNERS_EXTERNAL_ALLOW` to empty in its baked config, so `extraEnvVars` does not help).
