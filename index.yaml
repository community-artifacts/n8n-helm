  - annotations:
      artifacthub.io/changes: |
        - kind: added
          description: New `taskRunners.external.extraVolumeMounts` value to attach arbitrary volumes (e.g. a ConfigMap) into the external task-runner sidecar. The primary use case is overlaying `/etc/n8n-task-runners.json` to widen the `env-overrides` allowlist that the `n8nio/runners` image bakes — without this the image silently forces `N8N_RUNNERS_STDLIB_ALLOW` / `N8N_RUNNERS_EXTERNAL_ALLOW` to empty, so python `import json` and other stdlib modules raise `Security violations detected`.
      artifacthub.io/license: Apache-2.0
